    <script>
      getData();
      function buildParam(key, value) {
        url.searchParams.set(key, value);
      }
      function getData() {
        $("#filter-button span").removeClass("d-none");
        $("#filter-button").prop("disabled", true);
        fetch(url, {
          method: "GET",
          headers: {
            Authorization: bearer,
            "Content-Type": "application/json",
          },
        })
          .then(function (response) {
            return response.json();
          })
          .then(function (json) {
            $("#themeTable").DataTable({
              bDestroy: true,
              data: json.customers.map((tag) => Object.values(tag)),
              columnts: [
                { data: "id" },
                { data: "name" },
                { data: "email" },
                { data: "username" },
                { data: "invoice_currency_code" },
                { data: "cargo_freight_price_total" },
                { data: "cargo_packaging_price_total" },
                { data: "cargo_delivery_price_total" },
                { data: "extra_total" },
                { data: "cargo_discount_total" },
                { data: "cargo_total_price" },
                { data: "unpaid" },
                { data: "cargo_weight_total" },
                { data: "total_parcels" },
              ],
              fixedColumns: {
                left: 3,
                heightMatch: "none",
              },
              columnDefs: [
                {
                  defaultContent: "---",
                  targets: "_all",
                  createdCell: function (td, cellData, rowData, row, col) {
                    $(td).css("padding", "6px");
                  },
                },
                {
                  targets: 2,
                  render: function (data, type, row) {
                    if (row[2] != null) {
                      return (
                        '<a href = "/reports/customer.html?id=' +
                        row[0] +
                        "#" +
                        window.location.href.split("#")[1] +
                        '" target="_blank">' +
                        row[2] +
                        "</a>"
                      );
                    }
                  },
                },
                {
                  targets: 0,
                  render: function (data, type, row, meta) {
                    return meta.row + meta.settings._iDisplayStart + 1;
                  },
                },
                {
                  targets: 5,
                  render: function (data, type, row) {
                    return (
                      currency_symbols[row[4]] +
                      row[5]
                        .toFixed(2)
                        .toString()
                        .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                    );
                  },
                },
                {
                  targets: 6,
                  render: function (data, type, row) {
                    return (
                      currency_symbols[row[4]] +

                        .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                    );
                  },

                        .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                    );
                  },

                      row[8]
                        .toFixed(2)
                        .toString()
                        .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                    );
                  },
                },
                {
                  targets: 9,
                  render: function (data, type, row) {
                    return (
                      currency_symbols[row[4]] +
                      row[9]
                        .toFixed(2)
                        .toString()
                        .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
                    );
                  },
                },
                {
                  targets: 11,
                  render: function (data, type, row) {
                    return (
                      '<p style="color:red!important;">' +
                      currency_symbols[row[4]] +
                      row[11]

                      "</p>"
